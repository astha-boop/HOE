// Firebase db accessed via window.db (initialized below babel)

// ── DUAL-MODE HOOK: Firebase when available, localStorage fallback ─
function useFirebaseData(key, initial) {
  const [data, setData] = useState(() => {
    // Always seed from localStorage first for instant render
    try { const s = localStorage.getItem("hoe_v4_" + key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const [ready, setReady] = useState(!window.firebaseReady); // if no firebase, instantly ready

  useEffect(() => {
    if (!window.firebaseReady || !window.db) {
      setReady(true);
      return;
    }
    const ref = window.db.ref("hoe/" + key);
    const handler = ref.on("value", snap => {
      const val = snap.val();
      if (val !== null && val !== undefined) {
        const arr = Array.isArray(val) ? val : Object.values(val);
        setData(arr);
        try { localStorage.setItem("hoe_v4_" + key, JSON.stringify(arr)); } catch {}
      } else {
        ref.set(initial);
      }
      setReady(true);
    }, err => { console.error(err); setReady(true); });
    return () => ref.off("value", handler);
  }, []);

  const update = valOrFn => {
    setData(prev => {
      const next = typeof valOrFn === "function" ? valOrFn(prev) : valOrFn;
      try { localStorage.setItem("hoe_v4_" + key, JSON.stringify(next)); } catch {}
      if (window.firebaseReady && window.db) window.db.ref("hoe/" + key).set(next);
      return next;
    });
  };

  return [data, update, ready];
}

function useFirebaseList(key, initial) {
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem("hoe_meta_" + key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });

  useEffect(() => {
    if (!window.firebaseReady || !window.db) return;
    const ref = window.db.ref("hoe_meta/" + key);
    const handler = ref.on("value", snap => {
      const val = snap.val();
      if (val !== null && Array.isArray(val)) {
        setData(val);
        try { localStorage.setItem("hoe_meta_" + key, JSON.stringify(val)); } catch {}
      } else if (val === null) {
        ref.set(initial);
      }
    });
    return () => ref.off("value", handler);
  }, []);

  const update = next => {
    setData(next);
    try { localStorage.setItem("hoe_meta_" + key, JSON.stringify(next)); } catch {}
    if (window.firebaseReady && window.db) window.db.ref("hoe_meta/" + key).set(next);
  };

  return [data, update];
}

// ── EDIT CELL ────────────────────────────────────────────────────
function EditCell({ value, onChange, type = "text", mono, placeholder }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value ?? "");
  useEffect(() => { if (!editing) setVal(value ?? ""); }, [value, editing]);
  const commit = () => { setEditing(false); onChange(val); };
  if (editing) return (
    <input autoFocus type={type} value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setEditing(false); setVal(value ?? ""); }}}
      style={{ background: "#fff", border: `1px solid ${C.accentLight}`, borderRadius: 4, padding: "3px 8px",
        color: C.text, fontFamily: mono ? "monospace" : "'DM Sans',sans-serif", fontSize: "0.82rem",
        width: "100%", minWidth: 60 }} />
  );
  return (
    <span onClick={() => setEditing(true)}
      style={{ cursor: "text", display: "block", minHeight: 20, padding: "2px 3px",
        borderBottom: `1px dashed ${C.border}`, lineHeight: 1.5, color: C.text,
        fontFamily: mono ? "monospace" : "'DM Sans',sans-serif", fontSize: "0.82rem" }}>
      {(value !== undefined && value !== null && value !== "")
        ? value
        : <span style={{ color: C.textLight, fontStyle: "italic", fontSize: "0.75em" }}>{placeholder || "—"}</span>}
    </span>
  );
}

// ── DATE CELL ────────────────────────────────────────────────────
function DateCell({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const toISO = v => {
    if (!v) return "";
    const p = v.split("/");
    if (p.length === 3) return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
    return v;
  };
  const toDisplay = v => {
    if (!v) return "";
    const p = v.split("-");
    if (p.length === 3) return `${p[2]}/${p[1]}/${p[0]}`;
    return v;
  };
  if (editing) return (
    <input autoFocus type="date" defaultValue={toISO(value)}
      onChange={e => { if (e.target.value) { onChange(toDisplay(e.target.value)); setEditing(false); }}}
      onBlur={() => setEditing(false)}
      style={{ background: "#fff", border: `1px solid ${C.accentLight}`, borderRadius: 4, padding: "3px 8px",
        color: C.text, fontFamily: "'DM Sans',monospace", fontSize: "0.82rem", colorScheme: "light" }} />
  );
  return (
    <span onClick={() => setEditing(true)}
      style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 5, minHeight: 20, padding: "2px 3px",
        borderBottom: `1px dashed ${C.border}`, fontSize: "0.82rem", fontFamily: "'DM Sans',monospace", color: value ? C.text : C.textLight }}>
      {value ? <><span style={{ fontSize: "0.7rem", opacity: 0.5 }}>📅</span>{value}</> : <span style={{ fontStyle: "italic", fontSize: "0.75em" }}>pick date</span>}
    </span>
  );
}

  const commit = () => { setEditing(false); onChange(val); };

    <input autoFocus type="number" min="0" step="0.5" value={val}
      onChange={e => setVal(e.target.value)}

        color: C.text, fontFamily: "'DM Sans',monospace", fontSize: "0.85rem", width: 80 }} />

  );
}

// ── DROPDOWN CELL WITH ADD-NEW + REMOVE ─────────────────────────
function DropdownCell({ value, onChange, options, onAddOption, onRemoveOption, placeholder }) {
  const [open, setOpen]     = useState(false);
  const [adding, setAdding] = useState(false);
  const [newVal, setNewVal] = useState("");
  const [hovIdx, setHovIdx] = useState(-1);
  const ref = useRef();
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setAdding(false); setHovIdx(-1); }};
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const commit = () => {
    const t = newVal.trim();
    if (t) { onAddOption(t); onChange(t); }
    setAdding(false); setNewVal(""); setOpen(false);
  };
  const removeOpt = (e, o) => {
    e.stopPropagation();
    if (onRemoveOption) onRemoveOption(o);
    if (value === o) onChange("");
  };
  return (
    <div ref={ref} style={{ position: "relative", minWidth: 130 }}>
      <span onClick={() => setOpen(o => !o)}
        style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between",
          gap: 4, minHeight: 20, padding: "2px 4px", borderBottom: `1px dashed ${C.border}`,
          fontSize: "0.82rem", color: value ? C.text : C.textLight, fontFamily: "'DM Sans',sans-serif" }}>
        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 160 }}>
          {value || (placeholder || "— select —")}
        </span>
        <span style={{ fontSize: "0.55rem", color: C.accentLight, flexShrink: 0 }}>▾</span>
      </span>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, zIndex: 9999,
          background: "#fff", border: `1px solid ${C.border}`, borderRadius: 8, minWidth: 200,
          boxShadow: "0 8px 24px rgba(139,69,19,0.12)" }}>
          <div style={{ maxHeight: 220, overflowY: "auto" }}>
            {options.map((o, idx) => (
              <div key={o}
                style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "7px 10px 7px 14px", cursor: "pointer",
                  background: hovIdx === idx ? C.accentFaint : o === value ? C.accentFaint : "transparent" }}
                onMouseEnter={() => setHovIdx(idx)} onMouseLeave={() => setHovIdx(-1)}>
                <span onClick={() => { onChange(o); setOpen(false); }}
                  style={{ flex: 1, fontSize: "0.8rem", color: o === value ? C.accent : C.text,
                    fontFamily: "'DM Sans',sans-serif", fontWeight: o === value ? 500 : 400 }}>
                  {o}
                </span>
                {onRemoveOption && hovIdx === idx && (
                  <span onClick={e => removeOpt(e, o)}
                    title="Remove from list"
                    style={{ cursor: "pointer", color: C.textLight, fontSize: "0.7rem", marginLeft: 6, flexShrink: 0,
                      padding: "0 2px", lineHeight: 1 }}
                    onMouseEnter={e => e.currentTarget.style.color = C.red}
                    onMouseLeave={e => e.currentTarget.style.color = C.textLight}>🗑</span>
                )}
              </div>
            ))}
          </div>
          <div style={{ borderTop: `1px solid ${C.border}`, padding: "6px 8px" }}>
            {adding ? (
              <div style={{ display: "flex", gap: 4 }}>
                <input autoFocus value={newVal} onChange={e => setNewVal(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setAdding(false); setNewVal(""); }}}
                  placeholder="Type new…"
                  style={{ flex: 1, background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 4,
                    padding: "5px 8px", color: C.text, fontSize: "0.78rem" }} />
                <button onClick={commit}
                  style={{ background: C.accent, border: "none", borderRadius: 4, color: "#fff",
                    cursor: "pointer", padding: "0 10px", fontSize: "0.8rem" }}>✓</button>
              </div>
            ) : (
              <div onClick={() => setAdding(true)}
                style={{ fontSize: "0.72rem", color: C.accent, cursor: "pointer", padding: "4px 6px",
                  fontFamily: "'DM Sans',sans-serif", fontWeight: 500 }}
                onMouseEnter={e => e.currentTarget.style.opacity = "0.7"}
                onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                + Add new option
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── BILL CELL ────────────────────────────────────────────────────
function BillCell({ value, onChange }) {
  const fileRef = useRef();
  const files = Array.isArray(value) ? value : (value ? [{ name: value, dataUrl: null }] : []);
  const handleFile = e => {
    const picked = Array.from(e.target.files);
    if (!picked.length) return;
    let loaded = 0; const newFiles = [];
    picked.forEach(f => {
      const reader = new FileReader();
      reader.onload = ev => {
        newFiles.push({ name: f.name, dataUrl: ev.target.result, type: f.type });
        if (++loaded === picked.length) onChange([...files, ...newFiles]);
      };
      reader.readAsDataURL(f);
    });
    e.target.value = "";
  };
  const remove = idx => onChange(files.filter((_,i) => i !== idx));
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center" }}>
      {files.map((f, i) => (
        <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px",
          background: C.accentFaint, border: `1px solid ${C.border}`, borderRadius: 4, maxWidth: 130 }}>
          <span title={f.name} style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            maxWidth: 80, fontSize: "0.68rem", color: C.accent, fontFamily: "'DM Sans',monospace", cursor: f.dataUrl ? "pointer" : "default" }}
            onClick={() => { if (f.dataUrl) { const w = window.open(); w.document.write(`<iframe src="${f.dataUrl}" style="width:100%;height:100%;border:none"></iframe>`); }}}>
            {f.name.length > 12 ? f.name.slice(0,10)+"…" : f.name}
          </span>
          <span onClick={() => remove(i)} style={{ cursor: "pointer", color: C.textMuted, fontSize: "0.65rem" }}
            onMouseEnter={e => e.target.style.color = C.red} onMouseLeave={e => e.target.style.color = C.textMuted}>✕</span>
        </span>
      ))}
      <span onClick={() => fileRef.current.click()}
        style={{ cursor: "pointer", fontSize: "0.7rem", color: C.accent, border: `1px dashed ${C.accentLight}`,
          borderRadius: 4, padding: "2px 8px", whiteSpace: "nowrap" }}
        onMouseEnter={e => e.currentTarget.style.background = C.accentFaint}
        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
        + {files.length ? "Add" : "Upload"}
      </span>
      <input ref={fileRef} type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{ display: "none" }} onChange={handleFile} />
    </div>
  );
}

}

// ── CUSTOM ORDER ROW ─────────────────────────────────────────────
function CustomOrderRow({ r, i, onSave, onDelete }) {
  const toSegs = v => {
    if (Array.isArray(v) && v.length) return v;
    if (!v) return [{ fabric: "", mtrs: "" }];
    return String(v).split(",").map(s => ({ fabric: s.trim(), mtrs: "" })).filter(s => s.fabric) || [{ fabric: "", mtrs: "" }];
  };
  const [draft, setDraft] = useState({
    customer: r.customer, garment: r.garment, size: r.size,
    fabricSegments: toSegs(r.fabricSegments || r.fabric),
    status: r.status || "In Progress", dispatch: r.dispatch, remark: r.remark,
  });
  const [dirty, setDirty] = useState(false);
  const set = (field, val) => { setDraft(d => ({ ...d, [field]: val })); setDirty(true); };

  return (
    <tr className="hoe-row" style={{ background: dirty ? "#fffbf5" : C.surface }}>
      <td style={tdS}><span style={{ fontSize: "0.7rem", color: C.textMuted }}>{i+1}</span></td>
      <td style={tdS}><EditCell value={draft.customer} onChange={v => set("customer", v)} /></td>
      <td style={{ ...tdS, minWidth: 220, maxWidth: 300 }}><EditCell value={draft.garment} onChange={v => set("garment", v)} /></td>
      <td style={tdS}><EditCell value={draft.size} onChange={v => set("size", v)} /></td>
      <td style={{ ...tdS, minWidth: 300 }}>
        <FabricSegmentsCell segments={draft.fabricSegments} onChange={v => set("fabricSegments", v)} />
      </td>
      <td style={tdS}>
        <StatusPill value={draft.status} onChange={v => set("status", v)} options={ORDER_STATUS} />
      </td>
      <td style={tdS}><DateCell value={draft.dispatch} onChange={v => set("dispatch", v)} /></td>
      <td style={tdS}>
        <span style={{ fontSize: "0.75rem", color: r.lastUpdated ? C.textMid : C.textLight, fontFamily: "'DM Sans',monospace", display: "block" }}>
          {r.lastUpdated || <span style={{ fontStyle: "italic" }}>—</span>}
        </span>
        {dirty && <span style={{ fontSize: "0.62rem", color: C.gold, fontWeight: 600 }}>● unsaved</span>}
      </td>
      <td style={{ ...tdS, maxWidth: 160 }}><EditCell value={draft.remark} onChange={v => set("remark", v)} /></td>
      <td style={{ ...tdS, verticalAlign: "middle" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "center" }}>
          <button className="save-btn"
            onClick={() => { onSave(r.id, draft); setDirty(false); }}
            style={{ background: dirty ? C.accent : C.accentFaint, border: `1px solid ${dirty ? C.accent : C.border}`,
              color: dirty ? "#fff" : C.textMuted, borderRadius: 5, fontSize: "0.65rem", letterSpacing: 0.8,
              padding: "5px 10px", fontFamily: "'DM Sans',sans-serif", fontWeight: 600, whiteSpace: "nowrap" }}>
            ✓ Save
          </button>
          <button className="del-btn" onClick={onDelete}
            style={{ background: "none", border: "none", color: C.textLight, cursor: "pointer", fontSize: "0.85rem" }}>✕</button>
        </div>
      </td>
    </tr>
  );
}

// ── LOGIN PAGE ────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [mode, setMode]         = useState("login"); // login | reset

  const logoB64 = document.querySelector("img[alt='HOE Logo']")?.src || "";

  const handleLogin = async () => {
    setError(""); setLoading(true);
    try {
      await window.auth.signInWithEmailAndPassword(email.trim(), password);
    } catch(e) {
      setError(e.code === "auth/wrong-password" || e.code === "auth/user-not-found"
        ? "Incorrect email or password."
        : e.code === "auth/invalid-email"
        ? "Please enter a valid email."
        : "Login failed. Please try again.");
    }
    setLoading(false);
  };

  const handleReset = async () => {
    setError(""); setLoading(true);
    try {
      await window.auth.sendPasswordResetEmail(email.trim());
      setError("✓ Reset link sent! Check your inbox.");
      setMode("login");
    } catch(e) {
      setError("Could not send reset email. Check the address.");
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#1a0808 0%,#2d1010 60%,#1a0808 100%)",
      display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ width: "100%", maxWidth: 400, animation: "fadeUp 0.5s ease both" }}>

        {/* Logo */}
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ display: "inline-block", background: "#fdf5f0", borderRadius: 12,
            padding: "16px 28px", boxShadow: "0 8px 32px rgba(0,0,0,0.4)" }}>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "0.55rem", letterSpacing: 8,
              color: "#1a1a1a", marginBottom: 6, textAlign: "center" }}>HOUSE</div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0 }}>
              <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#8B1515",
                display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ width: 1.5, height: 10, background: "#fdf5f0", borderRadius: 2,
                  transform: "rotate(-35deg)", marginTop: -2 }} />
              </div>
            </div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "0.42rem", letterSpacing: 5,
              color: "#1a1a1a", marginTop: 6, textAlign: "center" }}>ENTREPRENAARI</div>
          </div>
          <div style={{ marginTop: 16, fontSize: "0.6rem", letterSpacing: 4,
            color: "rgba(253,245,240,0.4)", fontFamily: "'DM Sans',sans-serif" }}>
            ATELIER OPERATIONS DASHBOARD
          </div>
        </div>

        {/* Card */}
        <div style={{ background: "#fffcfc", borderRadius: 16, padding: "32px 32px 28px",
          boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
          <div style={{ fontSize: "1.1rem", fontWeight: 600, color: "#1e1414",
            fontFamily: "'DM Sans',sans-serif", marginBottom: 6 }}>
            {mode === "login" ? "Sign in" : "Reset password"}
          </div>
          <div style={{ fontSize: "0.75rem", color: "#9e7070", marginBottom: 24,
            fontFamily: "'DM Sans',sans-serif" }}>
            {mode === "login" ? "Team members only" : "Enter your email to receive a reset link"}
          </div>

          {/* Email */}

            <label style={{ fontSize: "0.68rem", fontWeight: 600, color: "#5a3030",
              letterSpacing: 1, display: "block", marginBottom: 6, fontFamily: "'DM Sans',sans-serif" }}>
              EMAIL

            <div style={{ marginBottom: 16, padding: "10px 14px", borderRadius: 8, fontSize: "0.78rem",
              fontFamily: "'DM Sans',sans-serif",
              background: error.startsWith("✓") ? "rgba(46,139,87,0.1)" : "rgba(192,57,43,0.1)",
              color: error.startsWith("✓") ? "#2e8b57" : "#c0392b",
              border: `1px solid ${error.startsWith("✓") ? "rgba(46,139,87,0.3)" : "rgba(192,57,43,0.3)"}` }}>
              {error}
            </div>
          )}

          {/* Submit button */}
          <button onClick={mode === "login" ? handleLogin : handleReset}
            disabled={loading || !email || (mode === "login" && !password)}
            style={{ width: "100%", padding: "12px", background: "#8B1515",
              color: "#fff", border: "none", borderRadius: 8, fontSize: "0.82rem",
              fontWeight: 600, fontFamily: "'DM Sans',sans-serif", cursor: "pointer",
              letterSpacing: 1, opacity: (loading || !email || (mode === "login" && !password)) ? 0.6 : 1,
              transition: "opacity 0.2s, transform 0.1s" }}
            onMouseEnter={e => { if (!loading) e.target.style.opacity = "0.85"; }}
            onMouseLeave={e => { if (!loading) e.target.style.opacity = "1"; }}>
            {loading ? "Please wait…" : mode === "login" ? "Sign In →" : "Send Reset Link"}
          </button>

          {/* Toggle */}
          <div style={{ marginTop: 18, textAlign: "center" }}>
            <span onClick={() => { setMode(mode === "login" ? "reset" : "login"); setError(""); }}
              style={{ fontSize: "0.72rem", color: "#8B1515", cursor: "pointer",
                fontFamily: "'DM Sans',sans-serif", fontWeight: 500 }}>
              {mode === "login" ? "Forgot password?" : "← Back to sign in"}
            </span>
          </div>
        </div>

        <div style={{ marginTop: 20, textAlign: "center", fontSize: "0.58rem",
          color: "rgba(253,245,240,0.2)", fontFamily: "'DM Sans',sans-serif", letterSpacing: 2 }}>
          HOUSE OF ENTREPRENAARI · INTERNAL USE ONLY
        </div>
      </div>
    </div>
  );
}

// ── APP WRAPPER WITH AUTH ─────────────────────────────────────────
function App() {
  const [user, setUser]           = useState(null);
  const [authChecked, setChecked] = useState(false);

  useEffect(() => {
    if (!window.firebaseReady || !window.auth) {
      // No Firebase — skip auth, go straight to dashboard
      setUser({ email: "local", displayName: "Local Mode" });
      setChecked(true);
      return;
    }
    const unsub = window.auth.onAuthStateChanged(u => {
      setUser(u);
      setChecked(true);
    });
    return () => unsub();
  }, []);

  if (!authChecked) return (
    <div style={{ minHeight: "100vh", background: "#1a0808", display: "flex",
      alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 40, height: 40, border: "3px solid #3a1010",
        borderTop: "3px solid #8B1515", borderRadius: "50%",
        animation: "spin 0.9s linear infinite" }} />
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );

  if (!user) return <LoginPage />;

  return <HOEDashboard user={user} onSignOut={() => window.auth && window.auth.signOut()} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
